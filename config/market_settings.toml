# Strong Leagues
"Primeira Liga" = 1.2
"Eredivisie" = 1.1
"Campeonato Brasileiro" = 1.0
"Liga Profesional de Fútbol" = 0.9

# Alternative Leagues
"Major League Soccer" = 0.9
"Pro League" = 1.3  # Exemplo de inflação de mercado
"Süper Lig" = 1.1
