[simulation]
# Number of transfer windows to simulate (2 windows ~= 1 season)
num_windows = 2
# Candidate pruning for faster optimization (0 disables).
top_k_players_per_position = 600

[optimization]
# Financial setup
initial_budget = 40000000.0 # 40 million euros
seasonal_revenue = 0 # 5 million euros
# Options: "top_value" or "team:<Club Name>"
initial_squad_strategy = "team:Flamengo"

[constraints]
max_squad_size = 30
min_squad_size = 18
friction_penalty = 0.0 # estava em 10, agora está em -500 e não deu muita diferença. ver se isso é realmente necessário
transaction_cost_buy = 0.20
transaction_cost_sell = 0.15
signing_bonus_rate = 0.5
# Soft salary-cap controls based on initial squad payroll
salary_cap_multiplier_initial = 1.15
salary_cap_penalty = 1500.0

foreign_limit = 9
foreign_violation_penalty = 20000
domestic_nationalities = ["Brazilian", "Brazil", "Brasil"]
unknown_nationality_is_foreign = true
nationality_fallback_to_league = false

squad_position_penalty = 400.0 # Penalidade suave (menor que o salário)

[bench_targets]
GK = 2 # Dois goleiros reservas, logo 3 GKs no total no elenco
CB = 3 # Dois zagueiros no banco
RB = 1
LB = 1
CM = 4
RW = 1
LW = 1
ST = 2

# Exact starters by position for each tactical scheme
[formation_catalog.433]
GK = 1
CB = 2
RB = 1
LB = 1
CM = 3
RW = 1
LW = 1
ST = 1

[formation_catalog.442]
GK = 1
CB = 2
RB = 1
LB = 1
CM = 2
RW = 1
LW = 1
ST = 2

[formation_catalog.532]
GK = 1
CB = 3
RB = 1
LB = 1
CM = 3
RW = 0
LW = 0
ST = 2

[formation_plan]
# Accepted keys: 0|w0|window_0 (window index starts at 0)
window_0 = "433"
window_1 = "433"
window_2 = "442"

[objective]
weight_quality = 0.7
weight_potential = 2.0 # it has to be bigger than weight quality because it opperates in a minor scale
chem_gain_starter = 0.08
chem_gain_reserve = 0.04
peso_asset = 1.0 
peso_performance = 50.0 
risk_appetite = -0.01

[chemistry]
affinity_nationalities = [
	"Brazilian", "Argentine", "Chilean", "Uruguayan"
]
affinity_initial_chemistry = 0.10
non_affinity_initial_chemistry = 0.04
initial_squad_chemistry = 1.0

# TODO: Transformar o root transactions a única forma como o modelo opera. Melhorar como isso é feito no dashboard.

[stochastic]
# Keep false to preserve deterministic behavior.
enabled = true
allow_root_transactions = true
ovr_shock_sigma = 0.06 # standard deviation of the shock applied to OVR 
value_shock_sigma = 0.02 # standard deviation of the shock applied to market value 
chemistry_conflict_probability = 0.02 # probability of random chemistry conflict in each non-root node
injury_probability = 0.08

[scenario_tree]
# Define a estrutura: Raiz -> 2 Filhos -> 4 Netos (Total 7 nós)
branching_by_stage = [2, 2]

[scenario_tree.stage_probabilities]
stage_1 = [0.60, 0.40] # Probabilidade de Sucesso vs. Instabilidade
stage_2 = [0.50, 0.50] # Probabilidade uniforme para os desfechos finais

# --- ESTÁGIO 0: PLANEJAMENTO (JANEIRO) ---
[scenario_tree.manual_events.node_1]
label = "Janeiro: Planejamento Estratégico"

# --- ESTÁGIO 1: MEIO DA TEMPORADA (JULHO) - A INCERTEZA DO COMANDO ---

# Ramo A: Continuidade
[scenario_tree.manual_events.node_2]
label = "Julho: Técnico Mantido (Sucesso e assédio)"
tactical_override = "433"

# Ramo B: Troca de Comando
[scenario_tree.manual_events.node_3]
label = "Julho: Troca de Técnico (Mudança para 5-3-2)"
tactical_override = "532"
injury_overrides = ["Agustín Rossi", "Leonardo Pereira"]

# --- ESTÁGIO 2: DESFECHO DA TEMPORADA (DEZEMBRO) - O TESTE DE RESILIÊNCIA ---

# Desfechos a partir do N2 (Técnico Mantido)
[scenario_tree.manual_events.node_4]
label = "Dezembro: Reta final sem sustos"
# Sem modificadores

[scenario_tree.manual_events.node_5]
label = "Dezembro: Lesão do Goleiro Titular"
injury_overrides = ["Agustín Rossi"]

# Desfechos a partir do N3 (Novo Técnico / 5-3-2)
[scenario_tree.manual_events.node_6]
label = "Dezembro: Reta final sem sustos"
# Sem modificadores

[scenario_tree.manual_events.node_7]
label = "Dezembro: Lesões no setor defensivo"
injury_overrides = ["Leonardo Pereira"] 
# Ou Léo Ortiz, dependendo de como está o nome na base